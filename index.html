<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Presentaciones Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563EB; --bg: #F3F4F6; --card: #FFFFFF; --text: #1F2937; --border: #E5E7EB; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
    .container { background: var(--card); max-width: 600px; width: 100%; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 15px; text-align: center; background: #FAFAFA; }
    input[type="file"] { width: 100%; font-size: 13px; }
    select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-top: 5px; }
    .btn { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    .btn:disabled { background: #9CA3AF; }
    #status { margin-top: 20px; text-align: center; font-weight: 500; padding: 15px; border-radius: 8px; background: #EFF6FF; color: #1E3A8A; display: none; }
    .export-links { display: flex; gap: 10px; margin-top: 15px; }
    .export-links a { flex: 1; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; color: white; }
    .btn-edit { background: #10B981; }
    .btn-pdf { background: #EF4444; }
    .btn-pptx { background: #F59E0B; }
  </style>
</head>
<body>

<div class="container">
  <h2>🧠 Creador de Presentaciones Editables</h2>
  
  <div class="form-group">
    <label>Diseño Base:</label>
    <select id="themeSelect">
      <option value="GAMMA_LIGHT">Estilo Gamma (Crema y Tarjetas Blancas)</option>
      <option value="CORP_BLUE">Corporativo (Blanco y Azul)</option>
    </select>
  </div>

  <div class="form-group">
    <label>Documentos (El Contenido es obligatorio):</label>
    <div class="file-drop"><input type="file" id="fileInstrucciones" accept=".pdf,.docx,.txt"> Instrucciones</div>
    <div class="file-drop" style="margin-top: 10px;"><input type="file" id="fileRubrica" accept=".pdf,.docx,.txt"> Rúbrica</div>
    <div class="file-drop" style="margin-top: 10px; border-color: var(--primary);"><input type="file" id="fileContenido" accept=".pdf,.docx,.txt"> Contenido Base</div>
  </div>

  <button class="btn" id="btnGenerar" onclick="generar()">Crear Presentación Editable</button>
  
  <div id="status"></div>
  <div id="export-links" class="export-links" style="display:none;">
    <a href="#" id="linkEdit" class="btn-edit" target="_blank">✏️ Editar (Slides)</a>
    <a href="#" id="linkPdf" class="btn-pdf">📥 Bajar PDF</a>
    <a href="#" id="linkPptx" class="btn-pptx">📥 Bajar PPTX</a>
  </div>
</div>

<script>
  // PON TU URL AQUÍ
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynInTrf1A_YLOlxWQfrIWk3m0wqcgX_QHn2HLZQ73bAyyIv_XFH6YS4k-rC6fLBiI/exec";

  const getBase64 = (file) => new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve({ data: reader.result.split(',')[1], mime: file.type });
    reader.onerror = error => reject(error);
  });

  async function generar() {
    const btn = document.getElementById('btnGenerar');
    const status = document.getElementById('status');
    const links = document.getElementById('export-links');
    const fileContenido = document.getElementById('fileContenido').files[0];
    
    if (!fileContenido) return alert("Sube el archivo de contenido.");

    btn.disabled = true;
    links.style.display = 'none';
    status.style.display = 'block';
    status.innerText = "Dibujando diapositivas editables... ⏳ (Aprox 40 seg)";

    try {
      const [inst, rub, cont] = await Promise.all([
        getBase64(document.getElementById('fileInstrucciones').files[0]),
        getBase64(document.getElementById('fileRubrica').files[0]),
        getBase64(fileContenido)
      ]);

      const payload = {
        action: "CREATE_SLIDES",
        themeCode: document.getElementById('themeSelect').value,
        instruccionesFile: inst ? inst.data : "", instruccionesMime: inst ? inst.mime : "",
        rubricaFile: rub ? rub.data : "", rubricaMime: rub ? rub.mime : "",
        contenidoFile: cont ? cont.data : "", contenidoMime: cont ? cont.mime : ""
      };

      const response = await fetch(SCRIPT_URL, {
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload)
      });
      const result = await response.json();
      
      if (result.success) {
        status.innerText = "¡Presentación creada con éxito!";
        links.style.display = 'flex';
        document.getElementById('linkEdit').href = `https://docs.google.com/presentation/d/${result.id}/edit`;
        document.getElementById('linkPdf').href = `https://docs.google.com/presentation/d/${result.id}/export/pdf`;
        document.getElementById('linkPptx').href = `https://docs.google.com/presentation/d/${result.id}/export/pptx`;
      } else throw new Error(result.error);
    } catch (e) {
      status.innerText = "Error: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
