<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GammaPro Web Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root { 
      --bg-color: #F8FAFC; 
      --text-main: #0F172A; 
      --text-muted: #475569; 
      --accent: #2563EB; 
      --card-bg: #FFFFFF;
      --border-color: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

    /* PANTALLA 1: CONFIGURACIÓN */
    #setup-screen { display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; }
    .setup-container { background: var(--card-bg); max-width: 650px; width: 100%; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 40px; border: 1px solid var(--border-color); }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--accent); }
    .header p { color: var(--text-muted); font-size: 15px; margin-top: 8px; }
    
    .form-group { margin-bottom: 25px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid var(--bg-color); padding-bottom: 8px; }
    .file-drop { border: 2px dashed var(--border-color); border-radius: 8px; padding: 15px; text-align: center; background: #F1F5F9; cursor: pointer; margin-bottom: 10px; transition: 0.2s;}
    .file-drop:hover { border-color: var(--accent); background: #EFF6FF; }
    input[type="file"] { width: 100%; font-size: 13px; color: var(--text-muted); }
    select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 14px; margin-bottom: 10px; background: #F8FAFC;}
    
    .generate-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .generate-btn:hover { background: #1D4ED8; transform: translateY(-2px); }
    .generate-btn:disabled { background: #94A3B8; cursor: not-allowed; transform: none; }
    
    #status { margin-top: 20px; text-align: center; font-weight: 500; font-size: 14px; padding: 15px; border-radius: 8px; background: #FEF3C7; color: #92400E; display: none;}

    /* PANTALLA 2: VISOR WEB ESTILO GAMMA */
    #presentation-screen { display: none; width: 100vw; height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
    
    .web-slide { 
      min-height: 100vh; 
      width: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 60px 40px; 
      border-bottom: 1px solid var(--border-color);
    }
    
    .slide-content { max-width: 1200px; width: 100%; display: flex; flex-direction: column; gap: 40px; }
    .slide-title { font-family: 'Playfair Display', serif; font-size: 46px; color: var(--accent); border-bottom: 3px solid var(--accent); padding-bottom: 15px; margin-bottom: 10px;}
    
    /* Layout: Tarjetas a la izquierda, Imagen a la derecha */
    .slide-layout { display: flex; gap: 50px; align-items: stretch; width: 100%; flex-wrap: wrap;}
    
    .blocks-grid { flex: 1; min-width: 350px; display: grid; grid-template-columns: 1fr; gap: 20px; }
    
    .gamma-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      transition: transform 0.3s;
    }
    .gamma-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    
    .card-icon { font-size: 28px; color: var(--accent); margin-bottom: 15px; }
    .card-subtitle { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--text-main); }
    .card-text { font-size: 15px; line-height: 1.6; color: var(--text-muted); }

    .image-wrapper { flex: 1; min-width: 350px; display: flex; justify-content: center; align-items: center; }
    /* Las imágenes de Ideogram se adaptarán al cuadro con sombras suaves */
    .image-wrapper img { width: 100%; max-width: 500px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); object-fit: cover; }
    
    /* Barra Flotante */
    .nav-bar { position: fixed; bottom: 30px; right: 30px; background: white; padding: 12px 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; gap: 20px; z-index: 100;}
    .nav-btn { background: none; border: none; font-size: 15px; color: var(--text-main); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;}
    .nav-btn:hover { color: var(--accent); }
    .btn-pdf { color: #DC2626; }
    .btn-pdf:hover { color: #991B1B; }
    
    /* Tema Oscuro */
    body.theme-dark { --bg-color: #0F172A; --text-main: #F8FAFC; --text-muted: #94A3B8; --card-bg: #1E293B; --border-color: #334155; --accent: #38BDF8; }

    /* MAGIA DE IMPRESIÓN (Para el PDF) */
    @media print {
      body { background: white !important; color: black !important; overflow: visible !important; }
      body.theme-dark { --bg-color: #FFFFFF; --text-main: #000000; --text-muted: #333333; --card-bg: #F9FAFB; --border-color: #E5E7EB; --accent: #2563EB; }
      #presentation-screen { display: block !important; height: auto !important; overflow: visible !important; }
      .nav-bar { display: none !important; }
      
      .web-slide { 
        min-height: auto; 
        height: 100vh; /* Obliga a que cada slide ocupe exactamente una hoja A4/Carta */
        page-break-after: always; 
        padding: 10mm; 
        align-items: flex-start;
      }
      .slide-layout { flex-wrap: nowrap; }
      .gamma-card { break-inside: avoid; border: 1px solid #ddd; box-shadow: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-container">
    <div class="header">
      <h1>⚕️ GammaPro Web Engine</h1>
      <p>Powered by Ideogram 3.0 & LLaMA</p>
    </div>

    <div class="form-group">
      <div class="section-title">1. Configuración Visual</div>
      <select id="themeSelect">
        <option value="light">Tema Clínico (Claro)</option>
        <option value="dark">Tema Quirófano (Oscuro)</option>
      </select>
    </div>

    <div class="form-group">
      <div class="section-title">2. Documentos Fuente</div>
      <div class="file-drop"><label>Instrucciones (Requerido para Portada)</label><input type="file" id="fileInstrucciones" accept=".pdf,.docx,.txt"></div>
      <div class="file-drop"><label>Rúbrica (Evaluación)</label><input type="file" id="fileRubrica" accept=".pdf,.docx,.txt"></div>
      <div class="file-drop" style="border-color: var(--accent); background: #EFF6FF;"><label>Contenido Base *Requerido</label><input type="file" id="fileContenido" accept=".pdf,.docx,.txt"></div>
    </div>

    <button id="btnGenerar" class="generate-btn" onclick="generar()">Renderizar Web con Ideogram</button>
    <div id="status"></div>
  </div>
</div>

<div id="presentation-screen">
  <div id="slides-container"></div>
  
  <div class="nav-bar">
    <button class="nav-btn btn-pdf" onclick="window.print()"><i class="fas fa-file-pdf"></i> Descargar PDF</button>
    <span style="color: var(--border-color);">|</span>
    <button class="nav-btn" onclick="location.reload()"><i class="fas fa-home"></i> Nuevo</button>
  </div>
</div>

<script>
  // YA ESTÁ TU URL REAL AQUÍ
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynInTrf1A_YLOlxWQfrIWk3m0wqcgX_QHn2HLZQ73bAyyIv_XFH6YS4k-rC6fLBiI/exec";

  const getBase64 = (file) => new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve({ data: reader.result.split(',')[1], mime: file.type });
    reader.onerror = error => reject(error);
  });

  async function generar() {
    const btn = document.getElementById('btnGenerar');
    const status = document.getElementById('status');
    const fileContenido = document.getElementById('fileContenido').files[0];
    
    if (!fileContenido) return alert("El archivo de Contenido Base es obligatorio.");

    btn.disabled = true;
    status.style.display = 'block';
    status.innerText = "LLaMA procesando textos e Ideogram ilustrando... ⏳ (Aprox 30 seg)";

    try {
      const [inst, rub, cont] = await Promise.all([
        getBase64(document.getElementById('fileInstrucciones').files[0]),
        getBase64(document.getElementById('fileRubrica').files[0]),
        getBase64(fileContenido)
      ]);

      const payload = {
        action: "GENERATE_WEB_PRESENTATION",
        autoSlides: true,
        instruccionesFile: inst ? inst.data : "", instruccionesMime: inst ? inst.mime : "",
        rubricaFile: rub ? rub.data : "", rubricaMime: rub ? rub.mime : "",
        contenidoFile: cont ? cont.data : "", contenidoMime: cont ? cont.mime : ""
      };

      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        redirect: "follow"
      });

      const result = await response.json();
      
      if (result.success && result.slides) {
        renderizarPresentacion(result.slides);
      } else {
        throw new Error(result.error);
      }
    } catch (error) {
      status.innerText = "Error: " + error.message;
      btn.disabled = false;
    }
  }

  function renderizarPresentacion(slides) {
    if (document.getElementById('themeSelect').value === 'dark') document.body.classList.add('theme-dark');

    document.getElementById('setup-screen').style.display = 'none';
    const presScreen = document.getElementById('presentation-screen');
    const container = document.getElementById('slides-container');
    presScreen.style.display = 'block';

    let htmlContent = "";

    slides.forEach((slide, index) => {
      // Invertir el layout pares/impares para darle dinamismo visual
      let isReversed = index % 2 !== 0 ? "flex-direction: row-reverse;" : "";

      htmlContent += `
        <div class="web-slide">
          <div class="slide-content">
            <h1 class="slide-title">${slide.titulo}</h1>
            <div class="slide-layout" style="${isReversed}">
              
              <div class="blocks-grid">
      `;
      
      if (slide.bloques && slide.bloques.length > 0) {
        slide.bloques.forEach(bloque => {
          let iconClass = bloque.icono ? bloque.icono : "fas fa-notes-medical"; 
          htmlContent += `
            <div class="gamma-card">
              <div class="card-icon"><i class="${iconClass}"></i></div>
              <h2 class="card-subtitle">${bloque.subtitulo}</h2>
              <p class="card-text">${formatearTexto(bloque.texto)}</p>
            </div>
          `;
        });
      }

      htmlContent += `</div>`;

      // Inyectar la imagen de Ideogram si existe
      if (slide.imagen_url) {
        htmlContent += `
          <div class="image-wrapper">
            <img src="${slide.imagen_url}" alt="Ideogram Illustration">
          </div>
        `;
      }

      htmlContent += `
            </div>
          </div>
        </div>
      `;
    });

    container.innerHTML = htmlContent;
  }

  function formatearTexto(texto) {
    if (!texto) return "";
    let formateado = texto.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    return formateado.replace(/\n/g, "<br>");
  }
</script>
</body>
</html>
