<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GammaPro Clone - Catálogo y PNGs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2563EB; --primary-hover: #1D4ED8; --bg: #F3F4F6; --card: #FFFFFF; --text: #1F2937; --border: #E5E7EB; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
    .app-container { background: var(--card); max-width: 700px; width: 100%; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 40px; border: 1px solid var(--border); }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 28px; font-weight: 700; margin: 0; color: var(--primary); }
    .header p { color: #6B7280; font-size: 15px; margin-top: 8px; }
    
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 8px; display: flex; align-items: center; justify-content: space-between;}
    .form-group { margin-bottom: 25px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    
    select, input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s; box-sizing: border-box; background: #F9FAFB; cursor: pointer;}
    select:focus, input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    
    /* ESTILOS DE CATÁLOGO */
    .template-selector { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
    
    .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 15px; text-align: center; background: #FAFAFA; transition: 0.3s; cursor: pointer; margin-bottom: 10px;}
    .file-drop:hover { border-color: var(--primary); background: #EFF6FF; }
    input[type="file"] { width: 100%; font-size: 13px; color: #6B7280; cursor: pointer;}
    
    .switch-container { display: flex; justify-content: space-between; align-items: center; background: #F9FAFB; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border);}
    
    button.generate-btn { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
    button.generate-btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);}
    button.generate-btn:disabled { background: #9CA3AF; cursor: not-allowed; box-shadow: none; transform: none;}
    
    #status { margin-top: 20px; text-align: center; font-weight: 500; font-size: 14px; padding: 15px; border-radius: 8px; }
    .status-processing { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A;}
    .status-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA;}
    
    .export-container { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    .export-btn { flex: 1; min-width: 150px; text-align: center; padding: 12px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: 0.3s; display: inline-block;}
    .btn-slides { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
    .btn-pdf { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
    .btn-pptx { background: #E0E7FF; color: #3730A3; border: 1px solid #C7D2FE; }
    .export-btn:hover { opacity: 0.8; transform: translateY(-1px); }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1>✨ Presentaciones Pro</h1>
    <p>Catálogo de temas ejecutivos e inyección inteligente de imágenes.</p>
  </div>

  <div class="form-group">
    <div class="section-title">1. Catálogo de Plantillas</div>
    <div class="template-selector">
      <select id="templateSelect" onchange="toggleCustomTemplate()">
        <option value="GAMMA_LIGHT">🎨 Estilo Gamma (Fondo Crema, Tarjetas Claras)</option>
        <option value="CORP_BLUE">🏢 Estilo Corporativo (Fondo Blanco, Acentos Azul Marino)</option>
        <option value="DARK_RED">🌙 Estilo Noche (Fondo Oscuro, Acentos Rojos)</option>
        <option value="CUSTOM">🔗 Cargar mi propio diseño desde Google Slides...</option>
      </select>
    </div>
    <input type="text" id="templateId" placeholder="Pega el ID de tu plantilla aquí..." style="display:none; margin-top:10px;">
  </div>

  <div class="form-group">
    <div class="switch-container">
      <label style="margin:0;">¿Dejar que la IA calcule las diapositivas?</label>
      <input type="checkbox" id="autoSlides" checked onchange="document.getElementById('manualSlideCount').style.display = this.checked ? 'none' : 'block'">
    </div>
    <input type="number" id="manualSlideCount" value="8" min="1" max="20" style="display:none;" placeholder="Número de slides">
  </div>

  <div class="form-group">
    <div class="section-title">2. Documentos Fuente</div>
    <div class="file-drop"><label>Instrucciones (Opcional)</label><input type="file" id="fileInstrucciones" accept=".pdf,.docx,.txt"></div>
    <div class="file-drop"><label>Rúbrica (Opcional)</label><input type="file" id="fileRubrica" accept=".pdf,.docx,.txt"></div>
    <div class="file-drop" style="border-color: var(--primary); background: #EFF6FF;"><label>Contenido Base *Requerido</label><input type="file" id="fileContenido" accept=".pdf,.docx,.txt"></div>
  </div>

  <div class="form-group">
    <div class="section-title">3. Motor de Imágenes</div>
    <select id="imageMode" onchange="toggleImageUpload()">
      <option value="AI">Generar con IA (Simulación de PNG transparente)</option>
      <option value="USER">Subir mis propios PNGs transparentes</option>
      <option value="NONE">Modo texto plano (Sin imágenes)</option>
    </select>
    
    <div id="userImageUpload" class="file-drop" style="display:none; margin-top:10px;">
      <label>Sube tus imágenes (Se repartirán por las slides)</label>
      <input type="file" id="fileUserImages" accept="image/*" multiple>
    </div>
  </div>

  <button id="btnGenerar" class="generate-btn" onclick="generar()">Construir Presentación</button>
  
  <div id="status" style="display:none;"></div>
  
  <div id="exportActions" class="export-container" style="display:none;">
    <a id="linkSlides" href="#" target="_blank" class="export-btn btn-slides">Ver en Slides</a>
    <a id="linkPdf" href="#" target="_blank" class="export-btn btn-pdf">Descargar PDF</a>
    <a id="linkPptx" href="#" target="_blank" class="export-btn btn-pptx">Descargar PPTX</a>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynInTrf1A_YLOlxWQfrIWk3m0wqcgX_QHn2HLZQ73bAyyIv_XFH6YS4k-rC6fLBiI/exec"; 

  function toggleCustomTemplate() {
    const isCustom = document.getElementById('templateSelect').value === "CUSTOM";
    document.getElementById('templateId').style.display = isCustom ? 'block' : 'none';
  }

  function toggleImageUpload() {
    const isUser = document.getElementById('imageMode').value === "USER";
    document.getElementById('userImageUpload').style.display = isUser ? 'block' : 'none';
  }

  const getBase64 = (file) => new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve({ data: reader.result.split(',')[1], mime: file.type });
    reader.onerror = error => reject(error);
  });

  async function generar() {
    const btn = document.getElementById('btnGenerar');
    const status = document.getElementById('status');
    const exportDiv = document.getElementById('exportActions');
    const fileContenido = document.getElementById('fileContenido').files[0];
    
    if (!fileContenido) return alert("El archivo de Contenido Base es obligatorio.");

    btn.disabled = true;
    exportDiv.style.display = 'none';
    status.style.display = 'block';
    status.className = 'status-processing';
    status.innerText = "Construyendo arquitectura visual... ⏳ (Aprox. 1 minuto)";

    try {
      const [inst, rub, cont] = await Promise.all([
        getBase64(document.getElementById('fileInstrucciones').files[0]),
        getBase64(document.getElementById('fileRubrica').files[0]),
        getBase64(fileContenido)
      ]);

      let userImagesData = [];
      if (document.getElementById('imageMode').value === "USER") {
        const imageFiles = document.getElementById('fileUserImages').files;
        for (let img of imageFiles) {
          let b64 = await getBase64(img);
          if (b64) userImagesData.push(b64);
        }
      }

      let templateVal = document.getElementById('templateSelect').value;
      let isCustom = (templateVal === "CUSTOM");
      let finalTemplateId = isCustom ? document.getElementById('templateId').value : "";

      const payload = {
        action: "CREATE_DRAFT",
        themeCode: isCustom ? "CUSTOM" : templateVal,
        templateId: finalTemplateId,
        fileName: "Presentación Ejecutiva - " + new Date().getTime(),
        autoSlides: document.getElementById('autoSlides').checked,
        slideCount: document.getElementById('manualSlideCount').value,
        imageMode: document.getElementById('imageMode').value,
        userImages: userImagesData,
        instruccionesFile: inst ? inst.data : "", instruccionesMime: inst ? inst.mime : "",
        rubricaFile: rub ? rub.data : "", rubricaMime: rub ? rub.mime : "",
        contenidoFile: cont ? cont.data : "", contenidoMime: cont ? cont.mime : ""
      };

      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        redirect: "follow"
      });

      const result = await response.json();
      
      if (result.success && result.id) {
        status.style.display = 'none';
        exportDiv.style.display = 'flex';
        document.getElementById('linkSlides').href = `https://docs.google.com/presentation/d/${result.id}/edit`;
        document.getElementById('linkPdf').href = `https://docs.google.com/presentation/d/${result.id}/export/pdf`;
        document.getElementById('linkPptx').href = `https://docs.google.com/presentation/d/${result.id}/export/pptx`;
      } else {
        throw new Error(result.error);
      }
    } catch (error) {
      status.className = 'status-error';
      status.innerText = "Error: " + error.message;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
