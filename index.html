<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presentaciones IA</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        textarea, input[type="number"], input[type="file"] { width: 100%; margin-top: 5px; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; background-color: #f8f9fa; display: none; }
    </style>
</head>
<body>

    <h1>Crea tu Presentación con IA</h1>
    
    <div class="form-group">
        <label>Instrucciones previas (ej. "Hazlo con tono formal"):</label>
        <textarea id="instructions" rows="4"></textarea>
    </div>

    <div class="form-group">
        <label>Número de slides:</label>
        <input type="number" id="slideCount" value="5" min="1" max="20">
    </div>

    <div class="form-group">
        <label>Sube tu archivo (PDF, Word, TXT):</label>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
    </div>

    <button type="button" onclick="generarPresentacion()">Generar Presentación</button>

    <div id="status"></div>

    <script>
        // AQUÍ PEGARÁS LA URL QUE TE DE GOOGLE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbynInTrf1A_YLOlxWQfrIWk3m0wqcgX_QHn2HLZQ73bAyyIv_XFH6YS4k-rC6fLBiI/exec"; 

        async function generarPresentacion() {
            const statusDiv = document.getElementById("status");
            const file = document.getElementById("fileInput").files[0];
            const instructions = document.getElementById("instructions").value;
            const slideCount = document.getElementById("slideCount").value;

            if (!file) {
                alert("Por favor, sube un documento primero.");
                return;
            }

            statusDiv.style.display = "block";
            statusDiv.innerText = "Procesando documento y conectando con la IA... esto puede tardar un minuto.";

            const reader = new FileReader();
            reader.onload = async function(event) {
                // Extraemos la parte base64 del archivo
                const base64 = event.target.result.split(',')[1]; 
                
                const payload = {
                    fileName: file.name,
                    mimeType: file.type,
                    fileData: base64,
                    instructions: instructions,
                    slideCount: slideCount
                };

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.text();
                    statusDiv.innerHTML = `<strong>Resultado:</strong> <br> ${result}`;
                } catch (error) {
                    statusDiv.innerText = "Ocurrió un error en la conexión: " + error;
                }
            };
            
            // Leemos el archivo
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
